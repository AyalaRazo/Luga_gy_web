<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Luga Gy - Salón de belleza especializado en Pedicure, Nails, Lashes y Brows. Servicio premium en México. Reserva tu cita ahora." />

    <meta name="theme-color" content="#FF9EB5" />

    <!-- Fonts: preconnect reduce latencia, media=print + onload evita bloqueo de render -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" /></noscript>

    <!-- Open Graph -->
    <meta property="og:title" content="Luga Gy — Tu salón de belleza de confianza" />
    <meta property="og:description" content="Especialistas en Pedicure, Nails, Lashes y Brows. Experiencia premium en México." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_AR" />

    <title>Luga Gy — Pedicure · Nails · Lashes · Brows</title>
  <script>
    (function() {
      try {
        var stored = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (stored === 'dark' || (!stored && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    })();
  </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
